# Recipe: container-04-monitoring
# Tier: 2 (container-only)
# Idempotency: strong
#
# Installs monitoring packages and creates configuration directories.

version: '1.0'
name: container-04-monitoring
description: "Container test: monitoring packages and config directories"

params:
  scrape_interval: 15s

machines:
  monitor:
    hostname: monitor
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-container-04-monitoring
      ephemeral: true
      privileged: false
      init: true

resources:
  monitoring-packages:
    type: package
    machine: monitor
    provider: apt
    packages:
      - jq
    tags: [monitoring, packages]
    resource_group: packages

  prometheus-dir:
    type: file
    machine: monitor
    state: directory
    path: /etc/prometheus
    owner: root
    mode: '0755'
    depends_on: [monitoring-packages]
    tags: [monitoring, prometheus]
    resource_group: prometheus

  prometheus-config:
    type: file
    machine: monitor
    path: /etc/prometheus/prometheus.yml
    content: |
      # Managed by forjar — monitoring-stack recipe
      global:
        scrape_interval: {{params.scrape_interval}}
        evaluation_interval: {{params.scrape_interval}}
      scrape_configs:
        - job_name: 'node'
          static_configs:
            - targets: ['localhost:9100']
    owner: root
    mode: '0644'
    depends_on: [prometheus-dir]
    tags: [monitoring, prometheus]
    resource_group: prometheus

  grafana-dir:
    type: file
    machine: monitor
    state: directory
    path: /etc/grafana
    owner: root
    mode: '0755'
    tags: [monitoring, grafana]
    resource_group: grafana

policy:
  failure: continue_independent
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Applying monitoring config'"
  post_apply: "echo 'Monitoring configured'"
  notify:
    on_success: "echo 'Monitoring stack ready'"
    on_failure: "echo 'Monitoring setup failed'"
    on_drift: "echo 'Monitoring config drifted'"

outputs:
  scrape_interval:
    value: "{{params.scrape_interval}}"
    description: "Prometheus scrape interval"
