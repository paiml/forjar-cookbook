# Recipe: container-01-devbox
# Tier: 2 (container-only)
# Idempotency: strong
#
# Installs development packages and creates dotfiles in a container.

version: '1.0'
name: container-01-devbox
description: "Container test: developer packages and dotfiles"

params:
  user: dev
  home: /home/dev
  editor: vim

machines:
  devbox:
    hostname: devbox
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-container-01-devbox
      ephemeral: true
      privileged: false
      init: true

resources:
  dev-packages:
    type: package
    machine: devbox
    provider: apt
    packages:
      - curl
      - git
      - tmux
      - htop
      - tree
      - jq
    tags: [dev, packages]
    resource_group: packages

  dev-user:
    type: user
    machine: devbox
    name: "{{params.user}}"
    home: "{{params.home}}"
    shell: /bin/bash
    depends_on: [dev-packages]
    tags: [dev, user]
    resource_group: user

  home-dir:
    type: file
    machine: devbox
    state: directory
    path: "{{params.home}}"
    owner: "{{params.user}}"
    mode: '0755'
    depends_on: [dev-user]
    tags: [dev, dotfiles]
    resource_group: dotfiles

  gitconfig:
    type: file
    machine: devbox
    path: "{{params.home}}/.gitconfig"
    content: |
      [core]
        editor = {{params.editor}}
      [init]
        defaultBranch = main
    owner: "{{params.user}}"
    mode: '0644'
    depends_on: [home-dir]
    tags: [dev, dotfiles]
    resource_group: dotfiles

  bashrc:
    type: file
    machine: devbox
    path: "{{params.home}}/.bashrc"
    content: |
      export EDITOR={{params.editor}}
      export PATH="$HOME/.cargo/bin:$PATH"
      alias ll='ls -alF'
    owner: "{{params.user}}"
    mode: '0644'
    depends_on: [home-dir]
    tags: [dev, dotfiles]
    resource_group: dotfiles

policy:
  failure: continue_independent
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Applying developer workstation config'"
  post_apply: "echo 'Developer workstation configured'"
  notify:
    on_success: "echo 'Dev workstation ready'"
    on_failure: "echo 'Dev workstation setup failed'"
    on_drift: "echo 'Dev workstation config drifted'"

outputs:
  user:
    value: "{{params.user}}"
    description: "Development user name"
  home:
    value: "{{params.home}}"
    description: "Home directory path"
