# Recipe: container-06-ci-runner
# Tier: 2 (container-only)
# Idempotency: strong
#
# Installs CI runner packages and workspace structure.

version: '1.0'
name: container-06-ci-runner
description: "Container test: CI runner packages and workspace directories"

params:
  runner_user: runner
  workspace: /opt/ci-runner

machines:
  runner-host:
    hostname: runner-host
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-container-06-ci-runner
      ephemeral: true
      privileged: false
      init: true

resources:
  ci-packages:
    type: package
    machine: runner-host
    provider: apt
    packages:
      - git
      - jq
      - build-essential
    tags: [ci, packages]
    resource_group: packages

  runner-user:
    type: user
    machine: runner-host
    name: "{{params.runner_user}}"
    home: "/home/{{params.runner_user}}"
    shell: /bin/bash
    depends_on: [ci-packages]
    tags: [ci, user]
    resource_group: user

  workspace-dir:
    type: file
    machine: runner-host
    state: directory
    path: "{{params.workspace}}"
    owner: "{{params.runner_user}}"
    mode: '0755'
    depends_on: [runner-user]
    tags: [ci, workspace]
    resource_group: workspace

  workspace-builds:
    type: file
    machine: runner-host
    state: directory
    path: "{{params.workspace}}/builds"
    owner: "{{params.runner_user}}"
    mode: '0755'
    depends_on: [workspace-dir]
    tags: [ci, workspace]
    resource_group: workspace

  workspace-cache:
    type: file
    machine: runner-host
    state: directory
    path: "{{params.workspace}}/cache"
    owner: "{{params.runner_user}}"
    mode: '0755'
    depends_on: [workspace-dir]
    tags: [ci, workspace]
    resource_group: workspace

  workspace-logs:
    type: file
    machine: runner-host
    state: directory
    path: "{{params.workspace}}/logs"
    owner: "{{params.runner_user}}"
    mode: '0755'
    depends_on: [workspace-dir]
    tags: [ci, workspace]
    resource_group: workspace

policy:
  failure: continue_independent
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Applying CI runner config'"
  post_apply: "echo 'CI runner configured'"
  notify:
    on_success: "echo 'CI runner ready'"
    on_failure: "echo 'CI runner setup failed'"
    on_drift: "echo 'CI runner config drifted'"

outputs:
  runner_user:
    value: "{{params.runner_user}}"
    description: "CI runner user name"
  workspace:
    value: "{{params.workspace}}"
    description: "CI runner workspace path"
