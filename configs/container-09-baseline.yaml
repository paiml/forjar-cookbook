# Container variant: 09-secure-baseline
# Tier: 2 (container-only)
# Stripped: sshd service, fail2ban service, firewall rules, sysctl
#
# Installs security packages and creates hardening configuration files.

version: '1.0'
name: container-09-baseline
description: "Container test: security packages and hardening configs"

machines:
  target:
    hostname: target
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-container-09-baseline
      ephemeral: true
      privileged: false
      init: true

resources:
  security-packages:
    type: package
    machine: target
    provider: apt
    packages:
      - openssh-server
      - fail2ban
      - unattended-upgrades
      - logwatch
      - rkhunter

  sshd-config:
    type: file
    machine: target
    path: /etc/ssh/sshd_config.d/hardened.conf
    content: |
      # Managed by forjar — secure-baseline recipe
      PermitRootLogin no
      PasswordAuthentication no
      X11Forwarding no
      MaxAuthTries 3
      ClientAliveInterval 300
      ClientAliveCountMax 2
    mode: '0600'
    depends_on: [security-packages]

  sshd-config-dir:
    type: file
    machine: target
    state: directory
    path: /etc/ssh/sshd_config.d
    mode: '0755'

  fail2ban-config:
    type: file
    machine: target
    path: /etc/fail2ban/jail.local
    content: |
      # Managed by forjar — secure-baseline recipe
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3
      [sshd]
      enabled = true
    mode: '0644'
    depends_on: [security-packages]

  audit-dir:
    type: file
    machine: target
    state: directory
    path: /var/log/audit
    mode: '0700'
