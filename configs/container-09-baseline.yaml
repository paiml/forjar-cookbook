# Recipe: container-09-baseline
# Tier: 2 (container-only)
# Idempotency: strong
#
# Installs security packages and creates hardening configuration files.

version: '1.0'
name: container-09-baseline
description: "Container test: security packages and hardening configs"

params:
  max_auth_tries: "3"
  ban_time: "3600"

machines:
  target:
    hostname: target
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-container-09-baseline
      ephemeral: true
      privileged: false
      init: true

resources:
  security-packages:
    type: package
    machine: target
    provider: apt
    packages:
      - openssh-server
      - fail2ban
      - unattended-upgrades
      - logwatch
      - rkhunter
    tags: [security, packages]
    resource_group: packages

  sshd-config-dir:
    type: file
    machine: target
    state: directory
    path: /etc/ssh/sshd_config.d
    owner: root
    mode: '0755'
    tags: [security, ssh]
    resource_group: ssh

  sshd-config:
    type: file
    machine: target
    path: /etc/ssh/sshd_config.d/hardened.conf
    content: |
      # Managed by forjar — secure-baseline recipe
      PermitRootLogin no
      PasswordAuthentication no
      X11Forwarding no
      MaxAuthTries {{params.max_auth_tries}}
      ClientAliveInterval 300
      ClientAliveCountMax 2
    owner: root
    mode: '0600'
    depends_on: [security-packages, sshd-config-dir]
    tags: [security, ssh]
    resource_group: ssh

  fail2ban-config:
    type: file
    machine: target
    path: /etc/fail2ban/jail.local
    content: |
      # Managed by forjar — secure-baseline recipe
      [DEFAULT]
      bantime = {{params.ban_time}}
      findtime = 600
      maxretry = 3
      [sshd]
      enabled = true
    owner: root
    mode: '0644'
    depends_on: [security-packages]
    tags: [security, fail2ban]
    resource_group: fail2ban

  audit-dir:
    type: file
    machine: target
    state: directory
    path: /var/log/audit
    owner: root
    mode: '0700'
    tags: [security, audit]
    resource_group: audit

policy:
  failure: continue_independent
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Applying security baseline'"
  post_apply: "echo 'Security baseline configured'"
  notify:
    on_success: "echo 'Security baseline ready'"
    on_failure: "echo 'Security baseline failed'"
    on_drift: "echo 'Security baseline drifted'"

outputs:
  max_auth_tries:
    value: "{{params.max_auth_tries}}"
    description: "SSH max authentication attempts"
  ban_time:
    value: "{{params.ban_time}}"
    description: "Fail2ban ban duration in seconds"
