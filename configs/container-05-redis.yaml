# Recipe: container-05-redis
# Tier: 2 (container-only)
# Idempotency: strong
#
# Installs Redis packages and configuration without starting the service.

version: '1.0'
name: container-05-redis
description: "Container test: Redis packages and configuration"

params:
  max_memory: 256mb

machines:
  cache:
    hostname: cache
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-container-05-redis
      ephemeral: true
      privileged: false
      init: true

resources:
  redis-pkg:
    type: package
    machine: cache
    provider: apt
    packages: [redis-server]
    tags: [cache, packages]
    resource_group: packages

  redis-conf-dir:
    type: file
    machine: cache
    state: directory
    path: /etc/redis
    owner: root
    mode: '0755'
    depends_on: [redis-pkg]
    tags: [cache, config]
    resource_group: config

  redis-config:
    type: file
    machine: cache
    path: /etc/redis/redis.conf
    content: |
      # Managed by forjar — redis-cache recipe
      bind 127.0.0.1
      port 6379
      maxmemory {{params.max_memory}}
      maxmemory-policy allkeys-lru
      appendonly yes
      appendfilename "appendonly.aof"
    owner: root
    mode: '0644'
    depends_on: [redis-conf-dir]
    tags: [cache, config]
    resource_group: config

  redis-data-dir:
    type: file
    machine: cache
    state: directory
    path: /var/lib/redis
    owner: redis
    group: redis
    mode: '0750'
    depends_on: [redis-pkg]
    tags: [cache, storage]
    resource_group: storage

policy:
  failure: continue_independent
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Applying Redis config'"
  post_apply: "echo 'Redis configured'"
  notify:
    on_success: "echo 'Redis cache ready'"
    on_failure: "echo 'Redis setup failed'"
    on_drift: "echo 'Redis config drifted'"

outputs:
  max_memory:
    value: "{{params.max_memory}}"
    description: "Redis max memory limit"
