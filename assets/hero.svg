<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="70" x2="900" y2="70"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="150" y1="0" x2="150" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="750" y1="0" x2="750" y2="280"/>
  </g>

  <!-- Glow effect behind icon -->
  <ellipse cx="130" cy="140" rx="80" ry="80" fill="url(#glow)"/>

  <!-- Anvil/forge icon -->
  <g transform="translate(90, 95)">
    <!-- Anvil body -->
    <path d="M10 50 L15 25 L65 25 L70 50 L75 55 L80 90 L0 90 L5 55 Z" fill="url(#accent)" opacity="0.9"/>
    <!-- Anvil top surface -->
    <rect x="12" y="20" width="56" height="8" rx="2" fill="#fdba74"/>
    <!-- Hammer -->
    <rect x="30" y="2" width="8" height="22" rx="2" fill="#94a3b8" transform="rotate(-15, 34, 13)"/>
    <rect x="22" y="-2" width="24" height="10" rx="3" fill="#cbd5e1" transform="rotate(-15, 34, 3)"/>
    <!-- Sparks -->
    <circle cx="55" cy="22" r="2" fill="#fbbf24" opacity="0.9"/>
    <circle cx="62" cy="15" r="1.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="68" cy="20" r="1" fill="#fde68a" opacity="0.8"/>
    <circle cx="58" cy="12" r="1.5" fill="#fde68a" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="200" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="700" fill="#f8fafc">
    Forjar Cookbook
  </text>

  <!-- Subtitle -->
  <text x="200" y="158" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#94a3b8">
    Qualification suite for real infrastructure
  </text>

  <!-- Stats bar -->
  <g transform="translate(200, 185)">
    <!-- Qualified badge -->
    <rect x="0" y="0" width="130" height="32" rx="6" fill="#166534" opacity="0.8"/>
    <text x="65" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#4ade80" text-anchor="middle">56 Qualified</text>

    <!-- Recipes badge -->
    <rect x="142" y="0" width="120" height="32" rx="6" fill="#1e3a5f" opacity="0.8"/>
    <text x="202" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">61 Recipes</text>

    <!-- Coverage badge -->
    <rect x="274" y="0" width="110" height="32" rx="6" fill="#713f12" opacity="0.8"/>
    <text x="329" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">95% Cov</text>

    <!-- Tests badge -->
    <rect x="396" y="0" width="110" height="32" rx="6" fill="#581c87" opacity="0.8"/>
    <text x="451" y="21" font-family="monospace" font-size="14" font-weight="600" fill="#c084fc" text-anchor="middle">204 Tests</text>
  </g>

  <!-- Pipeline visualization -->
  <g transform="translate(200, 238)">
    <text font-family="monospace" font-size="13" fill="#64748b">
      <tspan>validate</tspan>
      <tspan fill="#475569"> &#x2192; </tspan>
      <tspan fill="#64748b">plan</tspan>
      <tspan fill="#475569"> &#x2192; </tspan>
      <tspan fill="#64748b">apply</tspan>
      <tspan fill="#475569"> &#x2192; </tspan>
      <tspan fill="#64748b">idempotency</tspan>
      <tspan fill="#475569"> &#x2192; </tspan>
      <tspan fill="#f97316">score</tspan>
    </text>
  </g>

  <!-- Border accent -->
  <rect x="0" y="0" width="900" height="3" rx="1" fill="url(#accent)"/>
</svg>
