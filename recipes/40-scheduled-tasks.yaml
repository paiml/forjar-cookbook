# Recipe #40: Scheduled Task Management (Cron)
# Tier: 2+3 — container + bare-metal
# Idempotency: Strong
version: "1.0"
name: scheduled-tasks
machines:
  target:
    hostname: target
    addr: localhost
resources:
  backup-dir:
    type: file
    machine: target
    dest: /var/backups/forjar
    mode: "0750"
  backup-script:
    type: file
    machine: target
    dest: /usr/local/bin/forjar-backup.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      DEST="/var/backups/forjar/$(date +%Y%m%d-%H%M%S)"
      mkdir -p "$DEST"
      tar czf "$DEST/etc.tar.gz" /etc/ 2>/dev/null || true
      dpkg --get-selections > "$DEST/packages.list" 2>/dev/null || true
    depends_on: [backup-dir]
  backup-cron:
    type: cron
    machine: target
    name: forjar-backup
    schedule: "0 2 * * *"
    command: /usr/local/bin/forjar-backup.sh
    owner: root
    depends_on: [backup-script]
  log-cleanup-script:
    type: file
    machine: target
    dest: /usr/local/bin/forjar-log-cleanup.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      find /var/log -name "*.gz" -mtime +30 -delete 2>/dev/null || true
      find /var/log -name "*.old" -mtime +30 -delete 2>/dev/null || true
  log-cleanup-cron:
    type: cron
    machine: target
    name: forjar-log-cleanup
    schedule: "0 3 * * 0"
    command: /usr/local/bin/forjar-log-cleanup.sh
    owner: root
    depends_on: [log-cleanup-script]
