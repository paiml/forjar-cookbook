# Recipe: 73-pforge-mcp-server
# Tier: 1+2 (validate + container apply)
# Idempotency: strong
# Budget: first_apply < 30s, idempotent < 3s
#
# Deploy pforge MCP server for LLM agent integration.
# Installs forjar, configures MCP server endpoint, enables systemd service.

version: '1.0'
name: pforge-mcp-server
description: "Deploy pforge MCP server — agent-accessible infrastructure management"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  pforge_port: "8765"
  pforge_host: "127.0.0.1"
  pforge_log_level: "info"
  state_dir: "/var/lib/forjar/state"

machines:
  target:
    hostname: target
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-cookbook-73-pforge
      ephemeral: false
      privileged: false
      init: true

resources:
  forjar-binary:
    type: package
    machine: target
    provider: cargo
    packages:
      - forjar
    state: present
    tags:
      - infrastructure
      - mcp

  pforge-config-dir:
    type: file
    machine: target
    path: /etc/forjar
    state: directory
    owner: root
    group: root
    mode: "0755"
    depends_on:
      - forjar-binary
    tags:
      - configuration
      - mcp

  pforge-config:
    type: file
    machine: target
    path: /etc/forjar/pforge.yaml
    content: |
      # pforge MCP server configuration
      server:
        host: "{{params.pforge_host}}"
        port: {{params.pforge_port}}
        log_level: "{{params.pforge_log_level}}"
      state:
        directory: "{{params.state_dir}}"
      tools:
        - apply
        - plan
        - drift
        - status
        - explain
    owner: root
    group: root
    mode: "0644"
    depends_on:
      - pforge-config-dir
    tags:
      - configuration
      - mcp

  pforge-state-dir:
    type: file
    machine: target
    path: "{{params.state_dir}}"
    state: directory
    owner: root
    group: root
    mode: "0750"
    depends_on:
      - forjar-binary
    tags:
      - state
      - mcp

  pforge-service:
    type: service
    machine: target
    name: forjar-mcp
    enabled: true
    state: running
    depends_on:
      - pforge-config
      - pforge-state-dir
    tags:
      - service
      - mcp

  pforge-health-check:
    type: task
    machine: target
    command: "command -v forjar && test -f /etc/forjar/pforge.yaml && test -d {{params.state_dir}}"
    script: |
      #!/bin/bash
      set -euo pipefail
      # Verify forjar binary is available
      command -v forjar >/dev/null 2>&1
      # Verify config exists
      test -f /etc/forjar/pforge.yaml
      # Verify state directory exists
      test -d {{params.state_dir}}
    depends_on:
      - pforge-service
    tags:
      - health
      - mcp

outputs:
  pforge_endpoint:
    value: "{{params.pforge_host}}:{{params.pforge_port}}"
    description: "pforge MCP server endpoint"
  config_path:
    value: /etc/forjar/pforge.yaml
    description: "Server configuration file path"

checks:
  pforge-config-valid:
    machine: target
    command: "test -f /etc/forjar/pforge.yaml && test -d {{params.state_dir}}"
    description: "pforge config and state directory exist"
