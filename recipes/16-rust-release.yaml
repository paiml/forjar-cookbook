# Recipe: 16-rust-release
# Tier: 1+2+3 (validate, container build, bare-metal)
# Idempotency: strong
# Budget: first_apply < 120s, idempotent < 2s
#
# Compile a Rust crate with production release settings. Installs
# toolchain, build deps, and deploys the binary to target path.

version: '1.0'
name: rust-release-build
description: "Rust production release build with LTO, stripping, and binary deployment"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  crate_name: forjar
  target_path: /usr/local/bin/forjar
  opt_level: "3"

machines:
  build-host:
    hostname: build-host
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-cookbook-16-rust-release
      ephemeral: false
      privileged: false
      init: true

resources:
  build-deps:
    # Ensure required packages are installed and up-to-date
    type: package
    machine: build-host
    provider: apt
    packages:
      - build-essential
      - pkg-config
      - libssl-dev
      - curl
    tags: [rust, build-deps]
    resource_group: rust-build

  rust-toolchain:
    # Deploy managed configuration file
    type: file
    machine: build-host
    path: /usr/local/bin/forjar-ensure-rust.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      if ! command -v rustc &>/dev/null; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs -o /tmp/rustup-init.sh
        chmod +x /tmp/rustup-init.sh
        /tmp/rustup-init.sh -y
        rm -f /tmp/rustup-init.sh
        export PATH="$HOME/.cargo/bin:$PATH"
      fi
      rustc --version
      cargo --version
    # Dependency ordering
    depends_on: [build-deps]
    tags: [rust, toolchain]
    resource_group: rust-build

  build-script:
    # Deploy managed configuration file
    type: file
    machine: build-host
    path: /usr/local/bin/forjar-release-build.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      export PATH="$HOME/.cargo/bin:$PATH"
      CARGO_PROFILE_RELEASE_OPT_LEVEL={{params.opt_level}} \
      CARGO_PROFILE_RELEASE_LTO=true \
      CARGO_PROFILE_RELEASE_STRIP=true \
      CARGO_PROFILE_RELEASE_PANIC=unwind \
      cargo install --root /tmp/{{params.crate_name}}-build --force {{params.crate_name}} 2>/dev/null || \
        echo "Build skipped — crate not available"
    depends_on: [rust-toolchain]
    tags: [rust, build]
    resource_group: rust-build

  binary-verify:
    type: file
    machine: build-host
    path: /usr/local/bin/forjar-verify-binary.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      BINARY="{{params.target_path}}"
      if [ -x "$BINARY" ]; then
        echo "Binary: $BINARY"
        file "$BINARY"
        ls -lh "$BINARY" | awk '{print "SIZE:", $5}'
      else
        echo "Binary not yet deployed"
      fi
    depends_on: [build-script]
    tags: [rust, verify]
    resource_group: rust-build

policy:
  failure: continue_independent
  parallel_machines: false
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Starting Rust release build'"
  post_apply: "echo 'Rust release build complete'"
  notify:
    on_success: "echo 'Rust binary built and deployed'"
    on_failure: "echo 'Rust build failed — check toolchain'"
    on_drift: "echo 'Binary drift detected'"

outputs:
  binary_path:
    value: "{{params.target_path}}"
    description: "Deployed binary path"
  opt_level:
    value: "{{params.opt_level}}"
    description: "Optimization level"
