# Recipe: 29-distribution-pipeline
# Tier: 1+2+3 (validate, container pipeline, bare-metal)
# Idempotency: strong
# Budget: first_apply < 60s, idempotent < 2s
#
# End-to-end package distribution: build binary, package as .deb,
# stage to local repo, update index, verify installable. Connects
# recipes 17, 26, 27 into a single pipeline.

version: '1.0'
name: distribution-pipeline
description: "Full package pipeline: build binary, create .deb, stage to repo, verify installation"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  pkg_name: forjar
  pkg_version: 1.0.0
  repo_dir: /var/lib/apt-repo/internal

machines:
  pipeline-host:
    hostname: pipeline-host
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-cookbook-29-pipeline
      ephemeral: false
      privileged: false
      init: true

resources:
  pipeline-deps:
    # Ensure required packages are installed and up-to-date
    type: package
    machine: pipeline-host
    provider: apt
    packages:
      - dpkg-dev
      - build-essential
    tags: [pipeline, deps]
    resource_group: pipeline

  staging-tree:
    # Deploy managed configuration file
    type: file
    machine: pipeline-host
    state: directory
    path: /tmp/pipeline/staging/DEBIAN
    owner: root
    mode: '0755'
    # Dependency ordering
    depends_on: [pipeline-deps]
    tags: [pipeline, staging]
    resource_group: pipeline

  staging-bin:
    # Deploy managed configuration file
    type: file
    machine: pipeline-host
    state: directory
    path: /tmp/pipeline/staging/usr/local/bin
    owner: root
    mode: '0755'
    # Dependency ordering
    depends_on: [staging-tree]
    tags: [pipeline, staging]
    resource_group: pipeline

  control-file:
    # Deploy managed configuration file
    type: file
    machine: pipeline-host
    path: /tmp/pipeline/staging/DEBIAN/control
    owner: root
    mode: '0644'
    content: |
      Package: {{params.pkg_name}}
      Version: {{params.pkg_version}}
      Architecture: amd64
      Maintainer: ops@example.com
      Description: Declarative infrastructure convergence (pipeline build)
    # Dependency ordering
    depends_on: [staging-tree]
    tags: [pipeline, deb]
    resource_group: pipeline

  output-dir:
    # Deploy managed configuration file
    type: file
    machine: pipeline-host
    state: directory
    path: /tmp/pipeline/output
    owner: root
    mode: '0755'
    tags: [pipeline, output]
    resource_group: pipeline

  repo-pool:
    # Deploy managed configuration file
    type: file
    machine: pipeline-host
    state: directory
    path: "{{params.repo_dir}}/pool/main"
    owner: root
    mode: '0755'
    tags: [pipeline, repo]
    resource_group: pipeline

  pipeline-script:
    # Deploy managed configuration file
    type: file
    machine: pipeline-host
    path: /usr/local/bin/forjar-pipeline.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "=== Stage 1: Prepare binary ==="
      BIN="/tmp/pipeline/staging/usr/local/bin/{{params.pkg_name}}"
      if [ -x /usr/local/bin/{{params.pkg_name}} ]; then
        cp /usr/local/bin/{{params.pkg_name}} "$BIN"
      else
        echo '#!/bin/bash' > "$BIN"
        echo 'echo "{{params.pkg_name}} {{params.pkg_version}} (pipeline placeholder)"' >> "$BIN"
        chmod 755 "$BIN"
      fi

      echo "=== Stage 2: Build .deb ==="
      DEB="/tmp/pipeline/output/{{params.pkg_name}}_{{params.pkg_version}}_amd64.deb"
      dpkg-deb --build /tmp/pipeline/staging "$DEB" 2>/dev/null && \
        echo "Built: $DEB" || echo "dpkg-deb skipped"

      echo "=== Stage 3: Stage to repo ==="
      if [ -f "$DEB" ]; then
        cp "$DEB" {{params.repo_dir}}/pool/main/ 2>/dev/null || true
        echo "Staged to repo pool"
      fi

      echo "=== Stage 4: Update repo index ==="
      cd {{params.repo_dir}} 2>/dev/null && \
        dpkg-scanpackages pool/ 2>/dev/null > Packages || true

      echo "=== Pipeline complete ==="
    depends_on: [control-file, staging-bin, output-dir, repo-pool]
    tags: [pipeline, build]
    resource_group: pipeline

  verify-script:
    type: file
    machine: pipeline-host
    path: /usr/local/bin/forjar-pipeline-verify.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      DEB="/tmp/pipeline/output/{{params.pkg_name}}_{{params.pkg_version}}_amd64.deb"
      echo "=== Verification ==="
      [ -f "$DEB" ] && echo "OK: .deb exists" || echo "WARN: no .deb"
      [ -f "$DEB" ] && dpkg-deb --info "$DEB" 2>/dev/null || true
      ls -la {{params.repo_dir}}/pool/main/*.deb 2>/dev/null || echo "No .debs in repo pool"
    depends_on: [pipeline-script]
    tags: [pipeline, verify]
    resource_group: pipeline

policy:
  failure: continue_independent
  parallel_machines: false
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Running distribution pipeline'"
  post_apply: "echo 'Distribution pipeline complete'"
  notify:
    on_success: "echo 'Package built, staged, and verified'"
    on_failure: "echo 'Pipeline failed — check stages'"
    on_drift: "echo 'Pipeline output drift detected'"

outputs:
  deb_path:
    value: "/tmp/pipeline/output/{{params.pkg_name}}_{{params.pkg_version}}_amd64.deb"
    description: "Built .deb package path"
  repo_pool:
    value: "{{params.repo_dir}}/pool/main"
    description: "Repository pool directory"
