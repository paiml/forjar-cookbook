# Recipe: 22-secrets-lifecycle
# Tier: 1+2 (validate, container apply with encrypted secrets)
# Idempotency: strong
# Budget: first_apply < 10s, idempotent < 1s
#
# Secret management lifecycle: key generation, encryption, deployment,
# rotation, and audit. Uses age encryption for ENC[age,...] markers.

version: '1.0'
name: secrets-lifecycle
description: "End-to-end secret management with age encryption, rotation, and audit logging"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  app_name: myapp
  config_dir: /etc/myapp

machines:
  secrets-host:
    hostname: secrets-host
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-cookbook-22-secrets
      ephemeral: false
      privileged: false
      init: true

resources:
  secrets-dir:
    # Deploy managed configuration file
    type: file
    machine: secrets-host
    state: directory
    path: "{{params.config_dir}}"
    owner: root
    mode: '0700'
    tags: [secrets, dirs]
    resource_group: secrets

  identity-check-script:
    # Deploy managed configuration file
    type: file
    machine: secrets-host
    path: /usr/local/bin/forjar-identity-check.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      IDENTITY="$HOME/.config/forjar/identity.txt"
      if [ -f "$IDENTITY" ]; then
        echo "Age identity found: $IDENTITY"
      else
        echo "WARN: No age identity at $IDENTITY"
        echo "Generate with: age-keygen -o $IDENTITY"
      fi
    tags: [secrets, identity]
    resource_group: secrets

  app-config:
    # Deploy managed configuration file
    type: file
    machine: secrets-host
    path: "{{params.config_dir}}/config.env"
    owner: root
    mode: '0600'
    content: |
      # Managed by forjar — application secrets
      # In production, values use ENC[age,...] markers
      APP_NAME={{params.app_name}}
      API_KEY=placeholder-use-forjar-secrets-encrypt
      JWT_SECRET=placeholder-use-forjar-secrets-encrypt
    # Dependency ordering
    depends_on: [secrets-dir]
    tags: [secrets, config]
    resource_group: secrets

  db-credentials:
    type: file
    machine: secrets-host
    path: "{{params.config_dir}}/db.env"
    owner: root
    mode: '0600'
    content: |
      # Managed by forjar — database credentials
      DB_HOST=localhost
      DB_PORT=5432
      DB_NAME={{params.app_name}}
      DB_USER={{params.app_name}}
      DB_PASSWORD=placeholder-use-forjar-secrets-encrypt
    depends_on: [secrets-dir]
    tags: [secrets, database]
    resource_group: secrets

  secret-audit-log:
    type: file
    machine: secrets-host
    path: "{{params.config_dir}}/audit.log"
    owner: root
    mode: '0600'
    content: "# Forjar secrets audit log\n"
    depends_on: [secrets-dir]
    tags: [secrets, audit]
    resource_group: secrets

  rotation-reminder-cron:
    type: cron
    machine: secrets-host
    schedule: "0 0 1 * *"
    command: "echo 'Secret rotation reminder for {{params.app_name}}' | logger -t forjar-secrets"
    name: forjar-secret-rotation
    tags: [secrets, rotation]
    resource_group: secrets

  plaintext-guard-script:
    type: file
    machine: secrets-host
    path: /usr/local/bin/forjar-plaintext-guard.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      # Verify: no plaintext secrets in state lock files
      STATE_DIR="/tmp/state"
      if [ -d "$STATE_DIR" ]; then
        if grep -r "password\|secret\|api_key" "$STATE_DIR"/*/state.lock.yaml 2>/dev/null; then
          echo "FAIL: plaintext secret found in state lock"
          exit 1
        fi
      fi
      echo "OK: no plaintext secrets in state"
    depends_on: [app-config, db-credentials]
    tags: [secrets, guard]
    resource_group: secrets

policy:
  failure: continue_independent
  parallel_machines: false
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Deploying secrets for {{params.app_name}}'"
  post_apply: "echo 'Secrets deployed for {{params.app_name}}'"
  notify:
    on_success: "echo 'Secrets lifecycle configured'"
    on_failure: "echo 'Secret deployment failed — check identity'"
    on_drift: "echo 'Secret file drift detected — possible tampering'"

outputs:
  config_dir:
    value: "{{params.config_dir}}"
    description: "Application config directory"
  app_name:
    value: "{{params.app_name}}"
    description: "Application name"
