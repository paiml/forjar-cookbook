# Recipe: 78-jetson-base
# Tier: 1+3 (validate in CI, needs Jetson hardware)
# Idempotency: strong
# Budget: first_apply < 120s, idempotent < 3s
#
# Jetson Orin Nano base provisioning: strip JetPack bloat,
# keep CUDA/cuDNN/TensorRT, install sovereign stack tools.
# Designed for post-flash cleanup of NVIDIA's sample rootfs.

version: '1.0'
name: jetson-base
description: "Jetson Orin Nano base: strip bloat, keep CUDA stack, install sovereign tools"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  user: noah
  home: /home/noah
  src_dir: /home/noah/src
  data_dir: /home/noah/data
  jetpack_version: "6.2"

machines:
  jetson:
    hostname: jetson
    addr: jetson.local
    user: "{{params.user}}"
    ssh_key: ~/.ssh/id_ed25519
    arch: aarch64
    roles: [edge-inference]

resources:
  # ── Phase 1: Strip JetPack bloat ──────────────────────────────
  purge-bloat:
    type: package
    machine: jetson
    provider: apt
    state: absent
    packages:
      - libreoffice-*
      - thunderbird
      - chromium-browser
      - rhythmbox
      - shotwell
      - totem
      - cheese
      - gnome-calendar
      - gnome-mines
      - gnome-sudoku
      - aisleriot
      - gnome-mahjongg
      - ubuntu-desktop
      - gdm3
      - gnome-shell
      - gnome-terminal
      - nautilus
      - gedit
      - eog
      - evince
      - jupyter*
      - python3-notebook
      - python3-jupyter*
    tags: [jetson, cleanup]
    resource_group: cleanup

  apt-autoremove:
    type: task
    task_mode: batch
    machine: jetson
    command: "apt-get autoremove -y && apt-get clean"
    depends_on: [purge-bloat]
    tags: [jetson, cleanup]
    resource_group: cleanup

  # ── Phase 2: Essential packages ────────────────────────────────
  build-deps:
    type: package
    machine: jetson
    provider: apt
    packages:
      - build-essential
      - pkg-config
      - libssl-dev
      - curl
      - git
      - vim
      - tmux
      - htop
      - tree
      - unzip
      - ca-certificates
    depends_on: [apt-autoremove]
    tags: [jetson, deps]
    resource_group: deps

  # ── Phase 3: Directory structure ───────────────────────────────
  src-dir:
    type: file
    machine: jetson
    state: directory
    path: "{{params.src_dir}}"
    owner: "{{params.user}}"
    mode: "0755"
    tags: [jetson, dirs]
    resource_group: dirs

  data-dir:
    type: file
    machine: jetson
    state: directory
    path: "{{params.data_dir}}"
    owner: "{{params.user}}"
    mode: "0755"
    tags: [jetson, dirs]
    resource_group: dirs

  models-dir:
    type: file
    machine: jetson
    state: directory
    path: "{{params.data_dir}}/models"
    owner: "{{params.user}}"
    mode: "0755"
    depends_on: [data-dir]
    tags: [jetson, dirs]
    resource_group: dirs

  # ── Phase 4: Rust toolchain ────────────────────────────────────
  rustup-install:
    type: task
    task_mode: batch
    machine: jetson
    command: "curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
    depends_on: [build-deps]
    tags: [jetson, rust]
    resource_group: toolchain

  # ── Phase 5: Sovereign stack tools ─────────────────────────────
  stack-tools:
    type: package
    machine: jetson
    provider: cargo
    packages:
      - forjar
      - pmat
      - pzsh
      - copia
    depends_on: [rustup-install]
    tags: [jetson, sovereign]
    resource_group: toolchain

  # ── Phase 6: Git config ────────────────────────────────────────
  gitconfig:
    type: file
    machine: jetson
    path: "{{params.home}}/.gitconfig"
    owner: "{{params.user}}"
    mode: "0644"
    content: |
      [user]
          name = Noah Gift
          email = noah@paiml.com
      [core]
          editor = vim
          autocrlf = input
      [pull]
          rebase = true
      [push]
          default = current
      [init]
          defaultBranch = main
    tags: [jetson, config]
    resource_group: config

  # ── Phase 7: Shell config ──────────────────────────────────────
  bashrc:
    type: file
    machine: jetson
    path: "{{params.home}}/.bashrc"
    owner: "{{params.user}}"
    mode: "0644"
    content: |
      # Sovereign AI Stack — managed by forjar
      export PATH="$HOME/.cargo/bin:$HOME/.local/bin:/usr/local/bin:$PATH"

      # CUDA (JetPack)
      export CUDA_HOME=/usr/local/cuda
      export PATH=$CUDA_HOME/bin:$PATH
      export LD_LIBRARY_PATH=$CUDA_HOME/lib64:$LD_LIBRARY_PATH

      # Aliases
      alias ll='ls -alF'
      alias gs='git status'
      alias gl='git log --oneline -20'
    depends_on: [stack-tools]
    tags: [jetson, config]
    resource_group: config

  # ── Phase 8: CUDA validation ───────────────────────────────────
  cuda-check:
    type: task
    task_mode: batch
    machine: jetson
    command: "nvcc --version && nvidia-smi || jetson_clocks --show"
    depends_on: [build-deps]
    tags: [jetson, validation]
    resource_group: validation

policy:
  failure: stop_on_first
  parallel_machines: false
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Provisioning Jetson Orin Nano base'"
  post_apply: "echo 'Jetson base provisioning complete'"
  notify:
    on_success: "echo 'Jetson base converged'"
    on_failure: "echo 'Jetson base provisioning failed'"
    on_drift: "echo 'Jetson base drift detected'"

outputs:
  jetpack_version:
    value: "{{params.jetpack_version}}"
    description: "JetPack version"
  arch:
    value: "aarch64"
    description: "Target architecture"
  cuda_home:
    value: "/usr/local/cuda"
    description: "CUDA installation path"
