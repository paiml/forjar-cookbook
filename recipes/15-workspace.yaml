# Recipe: 15-workspace
# Tier: 1+3 (validate in CI, stacked overlays on bare-metal)
# Idempotency: strong
# Budget: first_apply < 60s, idempotent < 2s
#
# Nix-style multi-project workspace: shared base overlay with
# project-specific upper layers. Like nix develop .#project-a vs
# .#project-b — same Rust toolchain, different project deps.

version: '1.0'
name: multi-project-workspace
description: "Multi-project workspace with shared base packages and project-specific overlays"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  workspace_name: sovereign-ai
  base_packages: "build-essential,curl,git,pkg-config"

machines:
  # Container variant for CI. Production uses stacked pepita overlays:
  # base: pepita with rootfs: /
  # project-a: pepita with rootfs: /var/forjar/ws/base/merged
  workspace:
    hostname: workspace
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-cookbook-15-workspace
      ephemeral: false
      privileged: false
      init: true

resources:
  # --- Shared Base Layer ---
  base-packages:
    # Ensure required packages are installed and up-to-date
    type: package
    machine: workspace
    provider: apt
    packages:
      - build-essential
      - curl
      - git
      - pkg-config
    tags: [workspace, base]
    resource_group: base-layer

  workspace-dir:
    # Deploy managed configuration file
    type: file
    machine: workspace
    state: directory
    path: /var/forjar/ws
    owner: root
    mode: '0755'
    tags: [workspace, dirs]
    resource_group: base-layer

  # --- Project A: Forjar (Rust systems) ---
  project-a-dir:
    type: file
    machine: workspace
    state: directory
    path: /var/forjar/ws/forjar
    owner: root
    mode: '0755'
    depends_on: [workspace-dir]
    tags: [workspace, project-a]
    resource_group: project-a

  project-a-env:
    type: file
    machine: workspace
    path: /var/forjar/ws/forjar/env.sh
    owner: root
    mode: '0644'
    content: |
      # Managed by forjar — project: forjar
      export PROJECT_NAME=forjar
      export RUST_BACKTRACE=1
      export CARGO_TARGET_DIR=/tmp/forjar-target
    depends_on: [project-a-dir]
    tags: [workspace, project-a]
    resource_group: project-a

  project-a-deps:
    type: package
    machine: workspace
    provider: apt
    packages:
      - libssl-dev
    depends_on: [base-packages]
    tags: [workspace, project-a]
    resource_group: project-a

  # --- Project B: PMAT (Rust analysis) ---
  project-b-dir:
    type: file
    machine: workspace
    state: directory
    path: /var/forjar/ws/pmat
    owner: root
    mode: '0755'
    depends_on: [workspace-dir]
    tags: [workspace, project-b]
    resource_group: project-b

  project-b-env:
    type: file
    machine: workspace
    path: /var/forjar/ws/pmat/env.sh
    owner: root
    mode: '0644'
    content: |
      # Managed by forjar — project: pmat
      export PROJECT_NAME=pmat
      export CARGO_TARGET_DIR=/tmp/pmat-target
    depends_on: [project-b-dir]
    tags: [workspace, project-b]
    resource_group: project-b

  project-b-deps:
    type: package
    machine: workspace
    provider: apt
    packages:
      - sqlite3
      - libsqlite3-dev
    depends_on: [base-packages]
    tags: [workspace, project-b]
    resource_group: project-b

  # --- Workspace Manifest ---
  workspace-manifest:
    type: file
    machine: workspace
    path: /var/forjar/ws/workspace.json
    owner: root
    mode: '0644'
    content: |
      {
        "workspace": "{{params.workspace_name}}",
        "base_packages": ["build-essential", "curl", "git", "pkg-config"],
        "projects": [
          {"name": "forjar", "deps": ["libssl-dev"]},
          {"name": "pmat", "deps": ["sqlite3", "libsqlite3-dev"]}
        ],
        "transport": "pepita (container in CI)",
        "filesystem": "overlay (stacked)"
      }
    depends_on: [project-a-env, project-b-env]
    tags: [workspace, manifest]
    resource_group: workspace

policy:
  failure: continue_independent
  parallel_machines: false
  tripwire: true
  lock_file: true
  ssh_retries: 3
  pre_apply: "echo 'Creating workspace: {{params.workspace_name}}'"
  post_apply: "echo 'Workspace ready'"
  notify:
    on_success: "echo 'All workspace projects provisioned'"
    on_failure: "echo 'Workspace setup failed'"
    on_drift: "echo 'Workspace configuration drift detected'"

outputs:
  workspace_name:
    value: "{{params.workspace_name}}"
    description: "Workspace name"
  projects:
    value: "forjar,pmat"
    description: "Workspace project names"
