# Recipe: 96-oci-image-build
# Tier: 1+2+3 (validate + container apply)
# Idempotency: strong (file content convergence, completion_check)
# Budget: first_apply < 25s, idempotent < 2s
#
# OCI container image build with registry push. Daemonless image assembly:
# workspace setup, Dockerfile-equivalent config, layer splitting, registry push.
# Refs: FJ-2101, FJ-2104

version: '1.0'
name: oci-image-build
description: "OCI container image build — daemonless assembly, layer splitting, registry push"

includes:
  - includes/policy-defaults.yaml
  - includes/notify-hooks.yaml

params:
  image_name: forjar-demo-app
  image_version: "1.0.0"
  base_image: "docker.io/library/debian:bookworm-slim"
  registry_url: "localhost:5000"
  app_command: "/usr/local/bin/demo-app"

machines:
  builder:
    hostname: builder
    addr: container
    user: root
    arch: x86_64
    transport: container
    container:
      runtime: docker
      image: forjar-test-target
      name: forjar-cookbook-96-oci-build
      ephemeral: false
      privileged: false
      init: true

resources:
  workspace-dir:
    type: file
    machine: builder
    path: /opt/oci-build
    state: directory
    owner: root
    mode: '0755'
    tags: [oci, workspace]
    resource_group: build-workspace

  app-binary:
    type: file
    machine: builder
    path: /opt/oci-build/layers/app/usr/local/bin/demo-app
    owner: root
    mode: '0755'
    content: |
      #!/bin/sh
      echo "forjar-built: {{params.image_name}}:{{params.image_version}}"
      exec "$@"
    depends_on: [workspace-dir]
    tags: [oci, app-layer]
    resource_group: build-layers

  app-config:
    type: file
    machine: builder
    path: /opt/oci-build/layers/config/etc/demo-app/config.yaml
    owner: root
    mode: '0644'
    content: |
      version: "{{params.image_version}}"
      listen: 0.0.0.0:8080
      log_level: info
      health_endpoint: /healthz
    depends_on: [workspace-dir]
    tags: [oci, config-layer]
    resource_group: build-layers

  # Dockerfile-equivalent build plan
  build-plan:
    type: file
    machine: builder
    path: /opt/oci-build/image-build-plan.yaml
    owner: root
    mode: '0644'
    content: |
      name: "{{params.image_name}}"
      version: "{{params.image_version}}"
      base: "{{params.base_image}}"
      entrypoint: ["{{params.app_command}}"]
      labels:
        org.opencontainers.image.title: "{{params.image_name}}"
        org.opencontainers.image.version: "{{params.image_version}}"
        org.opencontainers.image.vendor: forjar
      layers:
        - name: app
          paths: [usr/local/bin/demo-app]
          strategy: squash
        - name: config
          paths: [etc/demo-app/]
          strategy: squash
      expose: [8080]
    depends_on: [workspace-dir]
    tags: [oci, build-plan]
    resource_group: build-config

  # OCI image resource — assemble the image
  oci-image:
    type: image
    machine: builder
    name: "{{params.image_name}}"
    version: "{{params.image_version}}"
    image: "{{params.base_image}}"
    command: "{{params.app_command}}"
    path: /opt/oci-build/image-build-plan.yaml
    depends_on: [build-plan, app-binary, app-config]
    tags: [oci, image, build]
    resource_group: image-assembly

  registry-push:
    type: task
    machine: builder
    command: |
      echo "Pushing {{params.image_name}}:{{params.image_version}} to {{params.registry_url}}"
      forjar image push \
        -f /opt/oci-build/image-build-plan.yaml \
        --registry {{params.registry_url}} \
        --tag {{params.image_version}} 2>/dev/null || \
        echo "Registry push simulated (registry not available in test)"
    working_dir: /opt/oci-build
    completion_check: "test -f /opt/oci-build/image-build-plan.yaml"
    depends_on: [oci-image]
    tags: [oci, registry, push]
    resource_group: registry

  verify-script:
    type: file
    machine: builder
    path: /usr/local/bin/forjar-oci-verify.sh
    owner: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      echo "=== OCI Image Build Verification ==="
      echo "Image: {{params.image_name}}:{{params.image_version}}"
      for F in image-build-plan.yaml layers/app/usr/local/bin/demo-app layers/config/etc/demo-app/config.yaml; do
        [ -f "/opt/oci-build/$F" ] && echo "  OK: $F" || echo "  MISSING: $F"
      done
    depends_on: [registry-push]
    tags: [oci, verify]
    resource_group: registry

policy:
  failure: stop_on_first
  parallel_machines: false
  tripwire: true
  lock_file: true
  deny_paths: [/etc/passwd, /etc/shadow]
  ssh_retries: 3
  pre_apply: "echo 'OCI image build: {{params.image_name}}:{{params.image_version}}'"
  post_apply: "echo 'OCI image build complete'"
  notify:
    on_success: "echo 'Image {{params.image_name}}:{{params.image_version}} built and pushed'"
    on_failure: "echo 'Image build failed — check build plan and layers'"
    on_drift: "echo 'Image build artifact drift detected'"

outputs:
  image_ref:
    value: "{{params.registry_url}}/{{params.image_name}}:{{params.image_version}}"
    description: "Full image reference with registry"
  build_plan:
    value: /opt/oci-build/image-build-plan.yaml
    description: "Image build plan path"
